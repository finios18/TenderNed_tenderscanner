name: Weekly Tender Scan

on:
  workflow_dispatch:

  schedule:
    - cron: "0 7 * * *"

jobs:
  tender-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dateutil PyPDF2 pdfminer.six openai

      - name: Run tender scan
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python tender_scan.py \
            --days 14 \
            --pages 1000 \
            --download_dir recent_downloads \
            --analyze_openai

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: tender-results
          path: recent_downloads/

      - name: Create mail summary
        run: |
          echo "TenderNed scan afgerond." > mail_summary.txt
          echo "" >> mail_summary.txt

          if [ -d "recent_downloads/GO" ] && [ "$(find recent_downloads/GO -mindepth 1 -maxdepth 1 -type d | wc -l)" -gt 0 ]; then
            echo "Er zijn interessante GO-aanbestedingen gevonden." >> mail_summary.txt
            echo "" >> mail_summary.txt
            echo "JSON-samenvattingen:" >> mail_summary.txt
            find recent_downloads/GO -name "openai_analysis_*.json" -print >> mail_summary.txt
          else
            echo "Er zijn vandaag geen interessante aanbestedingen gevonden." >> mail_summary.txt
          fi

          echo "" >> mail_summary.txt
          echo "Download aanbestedingsdocumenten/artifact:" >> mail_summary.txt
          echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> mail_summary.txt

      - name: Send tender email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "TenderNed scan resultaat"
          to: ${{ secrets.MAIL_TO }}
          from: Tender Bot <${{ secrets.SMTP_USERNAME }}>
          secure: true
          body: file://mail_summary.txt
          attachments: recent_downloads/GO/**/openai_analysis_*.json
