name: Weekly Tender Scan

on:
  workflow_dispatch:

  schedule:
    - cron: "0 7 * * *"

jobs:
  tender-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dateutil PyPDF2 pdfminer.six openai

      - name: Run tender scan
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python tender_scan.py \
            --days 14 \
            --pages 1000 \
            --download_dir recent_downloads \
            --analyze_openai

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: tender-results
          path: recent_downloads/
